<app-hero heading="Contact me!" img="contact_me1.jpg" subheading = "
	I would love to hear from you. Please fill the contact form below and I will get back to you as soon as possible">
</app-hero>
<div class="animated fadeIn container contact">
	<div class="inner-form">
		<div class="page-header text-center">
			<h2>Contact</h2>
		</div>

		<div class="form-group">
			<input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Full Name">
		</div><br>
		<div class="form-group">
			<input type="password" class="form-control" id="exampleInputPassword1" placeholder="Email">
		</div><br>
		<div class="form-group">
			<textarea class="form-control" id="exampleFormControlTextarea1" placeholder="Your Message"></textarea>
		</div><br>
		<button class="btn btn-primary btn-lg">Submit</button>
	</div>
</div>
