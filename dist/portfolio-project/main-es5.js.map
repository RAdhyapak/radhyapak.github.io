export default "<header id=\"heroContainer\" class=\"home_hero\">\r\n  <div class=\"container\">\r\n    <div class=\"row align-items-center\">\r\n      <div class=\"animated fadeInUp col-12 text-center vertical-align\">\r\n        <h1 class=\"heading\">{{heading}}</h1>\r\n        <p class=\"subheading\"> \r\n          {{subheading}}\r\n        </p>\r\n        <span class=\"subinfo\">{{subinfo}}</span>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</header>"
